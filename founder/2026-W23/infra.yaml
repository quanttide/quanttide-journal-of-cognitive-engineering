schemas:
- usage: 适用于技术负责人设计基础设施策略时参考
  entities:
  - name: 基础设施
    attributes:
    - 备份策略
    - 工具链归属
    - 架构边界
  - name: 治理体系
    attributes:
    - 标准化
    - 自动化
    - 分工
  causals:
  - condition: 被动防守备份且工具链归属不清
    outcome: 数据丢失风险和维护负担增加
  - condition: 主动设计体系
    outcome: 安全可靠平台
  boundaries:
  - 适用于多云端环境
  - 排除单机简单场景
  - 需要至少三个实例才进入抽象层
  properties:
  - key: 治理方式
    value: 主动设计
  dynamics:
  - key: 抽象风险
    value: 随复杂度递增
  mappings:
  - intent: 防数据丢失
    action: 建立自动化备份
  - intent: 理清工具链归属
    action: 标准化治理
  biases:
  - id: d3e4f5a6-b7c8-9012-ef45-678901234567
    belief: 备份越多越安全
    fact: 体系化治理比堆叠备份更有效
situations:
- id: b2c3d4e5-f6a7-8901-bcde-f12345678901
  name: infra
  label: 基础设施
  content:
    agenda: 建立安全可靠的平台基础设施，确保代码和数据安全，同时理清运维、开发、基础设施三者的边界与分工关系。
    ecology: 双云端同步依赖自动化链条、命令行删库风险、本机与远端架构边界模糊、工具链归属不清，缺乏标准化治理体系。
    frame: 将备份和基础设施问题理解为"体系化治理"问题——从被动防守（备份防丢数据）升级为主动设计（消息队列、工具链分工、Rust重写），同时意识到过度抽象本身也是风险。
    dynamics: 从备份策略到消息队列与工具链归属，再到 Rust 重写与抽象哲学反思，先点后面，先具体后抽象。
  relations:
  - source: infra
    target: innov
    relation_type: support
    confidence: medium
    description: 安全可靠的平台基础设施（自动化备份、消息队列、Rust重写）为快速POC探索提供稳定的实验环境，降低实验风险和数据丢失成本
