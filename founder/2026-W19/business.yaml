  title: 实现从项目驱动到大单驱动的商业模式转型
  description: 从大量小额项目的焦虑中解放，建立以十万以上大单为核心的可持续商业模式
  motivation: 放弃小红书等低效销售线索行为，意识到"不敢等才是最大阻碍"
  agent:
