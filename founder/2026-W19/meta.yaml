schemas:
- usage: 当认知系统本身的概念体系快速演化，需要系统性地自我理解与规范化时使用
  entities:
  - name: 元认知
    attributes:
    - 认知的认知
    - 系统成熟度的标志
    - 自我理解的起点
  - name: 概念体系
    attributes:
    - 快速演化中
    - 命名和分类需不断调整
    - 需要系统性整理
  - name: 自我治理
    attributes:
    - 系统理解自身时进入可治理状态
    - 从无意识到有意识
    - 规范化是治理的前提
  causals:
  - condition: 概念体系快速演化，命名和分类持续变化
    outcome: 需要建立元认知反思体系进行系统性整理和规范化
  - condition: 系统开始理解自身的认知模式
    outcome: 系统才真正进入可治理状态——元认知是成熟度的标志
  boundaries:
  - 适用于概念体系快速演化的早期阶段，不适用于成熟稳定的概念体系
  - 假设系统具备自我反思的元能力，不适用于完全无反思能力的系统
  - 元认知本身也在演化中，不追求一次性完备
  properties:
  - key: 认知层级
    value: 二阶认知（认知的认知）
  - key: 治理前提
    value: 自我理解 → 可治理
  - key: 建设方式
    value: 从无意识的演化到有意识的元认知建设
  dynamics:
  - key: 认知成熟度
    value: 从无意识的演化到有意识的元认知建设
  - key: 概念稳定性
    value: 从快速演化的概念体系到逐步规范化的分类框架
  mappings:
  - intent: 建立元认知反思体系
    action: 系统性记录和整理演化中的概念体系，规范命名与分类，提升系统自我理解能力
  biases:
  - id: 660e8400-e29b-41d4-a716-446655440006
    belief: 认为命名和分类可以一次性确定，找到「正确」的名称就不再需要调整
    fact: 概念体系随认知深化持续演化——命名是认知的工具而非终点，需要随理解加深不断迭代
situations:
- id: f6a7b8c9-d0e1-2345-fabc-456789012319
  name: meta
  label: 元
  content:
    agenda: 补足信息系统设计的方法论短板，建立概念统一与标准化流程，使隐式的信息结构显性化并可独立维护。
    ecology: 信息结构设计能力被识别为隐藏缺失、数据需求文档与工程标准文档分离、标准化被定性为"填坑"、从模糊需求到明确解决方案的完整推理链。
    frame: 将标准化理解为"填坑"而非前置设计——信息结构设计能力是缺失的方法论环节，标准化是用技术性手段让概念统一变得容易，而非追求完美定义。
    dynamics: 从流程标准化的需求到信息结构设计能力的发现，再到标准化即填坑的认知和数据需求文档的落地分离。
intentions:
- id: a62094a9-96ed-4084-90a1-49022bf5b2d0
  title: 建立标准化与信息结构的治理体系
  description: 补足信息系统设计的方法论短板，使隐式的信息结构显性化并可独立维护
  motivation: 策略和风格无法稳定输出是因为缺少标准化流程和结构设计能力
  agent:
    name: founder
    label: 创始人
  level:
    name: middle
    label: 中层
    description: 为顶层"平台体系可维护"服务的支撑目标
  priority:
    name: low
    label: 低
    description: 背景建设任务，非当周紧急事项
  trigger:
    name: conditional
    label: 条件触发
    description: 系统边界稳定后推进
  risk:
    name: low
    label: 低
    description: 标准化是"填坑"而非前置设计，方向明确
