situations:
- id: b8c9d0e1-f2a3-4567-bcde-678901234567
  name: product
  label: 产品研发
  content:
    agenda: 解决现有编辑器和文档工具不适应 AI 表达习惯的问题，探索可编辑阅读器等新交互范式。
    ecology: 现有编辑器/文档工具无法适应 AI 多样化表达、分解组件设计可缓解 AI 注意力不足、可编辑阅读器成为候选范式、块编辑器思想提供实现路径。
    frame: 将交互设计理解为范式层面的问题而非 UI 技巧问题——AI 的表达形式已超越传统文档工具的能力边界，需要从阅读器而非编辑器的角度重新思考交互。
    dynamics: 从 UI 实现技巧（分解组件）上升到交互范式思考（可编辑阅读器、块编辑器），是技术方案到范式认知的演进。
