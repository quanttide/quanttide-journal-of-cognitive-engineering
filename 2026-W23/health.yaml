situations:
- id: c9d0e1f2-a3b4-5678-cdef-789012345678
  name: health
  label: 身心健康
  content:
    agenda: 在高压探索中维持身心健康，通过节奏调整和意义重建避免倦怠，保障所有其他意图得以持续运作。
    ecology: 早睡早起的工作节奏比熬夜更可持续、低耗能模式验证了疲劳应对策略、写小说的无意义感反复出现、整合带来清晰感作为对冲机制。
    frame: 将心理调节理解为一个"元意图"——它不直接驱动某个领域的工作，而是保障其他所有意图能够持续运作的基础条件，无意义感是高压探索的副产品。
    dynamics: 从早睡早起的积极节奏尝试，到低耗能策略应对疲劳，再到无意义感的反复出现与整合感的正向对冲，是一条贯穿全周的状态线索。
