    label: 低
    description: 全周持续探索但核心问题未收敛
  trigger:
    name: conditional
    label: 条件触发
    description: 模型与框架的取舍问题收敛后深入
  risk:
    name: high
    label: 高
    description: 模型更强但不可控vs框架可控但适应性不足，核心矛盾未解决
