schemas:
- usage: 当团队规模扩张，核心成员变动，需要从依赖创始人个人决策转向制度化治理并建立反脆弱机制时使用
  entities:
  - name: 组织治理模式
    attributes:
    - 从人治到法治的转型
    - 保持组织温度的同时建立制度
    - 核心成员变动背景下维持稳定
  - name: 创始人决策
    attributes:
    - 人治阶段的核心决策来源
    - 风险随规模扩张而显现
    - 依赖越高转型越迫切
  - name: 制度体系
    attributes:
    - 可复用的治理框架
    - 需保持组织温度
    - 从简单规则逐步沉淀
  - name: 反脆弱机制
    attributes:
    - 不是抵抗冲击
    - 从冲击中获益
    - 核心成员变动的应对
  causals:
  - condition: 团队规模扩张，管理复杂度上升，创始人个人决策依赖的风险显现
    outcome: 需要推动从人治到法治的转型，建立可复用的制度体系
  - condition: 建立制度化治理体系
    outcome: 组织从依赖个人转向制度驱动，核心成员变动的影响被控制在制度框架内
  - condition: 制度建设以排斥人情的方式进行
    outcome: 丧失组织温度，法治与人情的张力激化，制度执行力下降
  - condition: 制度建设中保留组织温度
    outcome: 在法治框架内保持人际关系弹性，制度更易被接受和执行
  boundaries:
  - 适用于中小型团队的治理转型期，不适用于已成熟制度化的大型组织
  - 假设创始人有意愿和能力推动制度转型，不适用于创始人抗拒制度化场景
  - 不涵盖上市公司的合规治理、董事会结构等正式公司治理范畴
  properties:
  - key: 转型方向
    value: 从人治（依赖个人）到法治（制度化治理）
  - key: 核心矛盾
    value: 法治与人情的张力——制度化是必要的，但会丧失温度
  - key: 反脆弱定位
    value: 不是抵抗冲击，而是从冲击中获益——核心成员变动是制度建设的催化剂
  - key: 转型前提
    value: 创始人意识和决心——只有创始人主动放权，转型才能真正启动
  dynamics:
  - key: 治理演化
    value: 从依赖个人决策到制度化治理——随着规模扩张复杂度上升，转型压力递增
  - key: 制度成熟度
    value: 从简单规则沉淀到可复用的制度体系——在核心成员变动等冲击中验证和完善
  mappings:
  - intent: 建立反脆弱的组织机制
    motivation: 依赖创始人个人决策的风险显现
    action: 系统识别核心决策风险点，建立替代与备份机制，将冲击转化为制度建设契机
    trigger: persistent
    risk: medium
  - intent: 推动从人治到法治的文化转型
    motivation: 组织温度需要与制度建设同步
    action: 在建立可复用制度体系的同时保持组织温度，用对话和参与化解法治与人情的张力
    trigger: persistent
    risk: high
  biases:
  - id: 660e8400-e29b-41d4-a716-446655440107
    belief: 认为反脆弱就是增强组织抵抗力——越坚固越安全
    fact: 反脆弱的本质不是抵抗冲击，而是从冲击中获益——核心成员变动是制度建设的催化剂而非威胁
  - id: 660e8400-e29b-41d4-a716-446655440108
    belief: 认为制度化必然会丧失组织温度——法治与人情不可兼得
    fact: 好的制度建设可以在保持温度的同时建立可复用体系——温度来自制度的人文设计而非人治本身
  - id: 660e8400-e29b-41d4-a716-446655440109
    belief: 认为创始人能力强就可以一直靠个人决策维持组织运转，制度化不是必需的
    fact: 随着规模扩张，创始人个人决策的风险指数级增长——制度不是对创始人的否定，而是对其能力的倍增和传承
situations:
- id: a1b2c3d4-e5f6-7890-abcd-ef1234567822
  name: org
  label: 组织管理
  content:
    agenda: 通过系统化筛选、培训和分工构建可扩展的组织能力，使自己从日常管理中脱身。
    ecology: 带新人方法成型、人事云理念（用系统对抗低质量招聘）、秘书处重组后能力断层、组织处于从个人到系统的转型阵痛期。
    frame: 将团队建设理解为从"数量扩张"转向"质量筛选"的跃迁——人事云是系统化工具，秘书处能力断层暴露出执行管理理论缺失的问题。
    dynamics: 从带新人的具体方法到人事云的系统理念，再到秘书处能力断层的暴露，招聘需求从数量扩张转向质量筛选。
  relations:
  - source: org
    target: business
    relation_type: support
    confidence: medium
    description: 组织管理的系统化人才筛选和培训管道（人事云理念）为商务拓展的客户交付提供可扩展的团队能力，秘书处能力断层解决后直接释放商业交付瓶颈
intentions:
- id: e4b3c5d5-960f-41c6-be79-3bf29dddd183
  title: 搭建高效团队与招聘体系
  description: 通过系统化筛选、培训和分工构建可扩展的组织能力
  motivation: 秘书处重组后能力断层暴露，招聘需求从数量扩张转向质量筛选
  agent:
    name: founder
    label: 创始人
  level:
    name: middle
    label: 中层
    description: 为顶层"组织可扩展"服务
  priority:
    name: medium
    label: 中
    description: 人事云理念在本周确立但秘书处断层尚未解决
  trigger:
    name: persistent
    label: 持续
    description: 组织能力成为研发效率的瓶颈
  risk:
    name: medium
    label: 中
    description: 研发效率大幅提升但组织能力滞后，异步发展需要协调
