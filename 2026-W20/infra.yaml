schemas:
- usage: 当工具链快速膨胀、命名分类规则混乱、需要从单点治理走向体系化管理时使用
  entities:
  - name: 体系化治理
    attributes:
    - 从单点工具走向体系化治理
    - 降低维护负担是核心目标
    - 命名和分类规则需要统一
    - 领域边界开始模糊需明确
  - name: 基础设施元认知
    attributes:
    - 基础设施治理是元认知的外化
    - 系统有意识地管理自身结构
    - 成熟阶段的标志
    - 从工具堆积到体系化治理的演化
  - name: 工具链
    attributes:
    - 快速膨胀中
    - 组合复杂度增加
    - 需要统一管理规则
  causals:
  - condition: 工具链快速膨胀且命名分类规则不统一
    outcome: 领域边界开始模糊，维护负担持续增加，需要体系化治理
  - condition: 基础设施停留在工具堆积阶段缺乏主动治理
    outcome: 系统无法进入成熟阶段——体系化治理是系统成熟度提升的前提
  boundaries:
  - 适用于个人或团队的基础设施治理，不适用于企业级或大规模分布式基础设施管理
  - 假设工具链规模可控但膨胀中，不适用于已经失控的混乱环境
  - 不涵盖底层硬件或网络基础设施的治理
  properties:
  - key: 治理本质
    value: 元认知的外化——系统有意识地管理自身结构
  - key: 治理目标
    value: 从工具堆积到体系化治理，降低维护负担
  - key: 核心方法
    value: 统一命名分类规则，明确领域边界，避免边界模糊
  dynamics:
  - key: 治理演化
    value: 从单点工具治理到体系化治理
  - key: 成熟度演化
    value: 从工具堆积阶段到有意识自我管理阶段
  mappings:
  - intent: 推动基础设施体系化治理
    motivation: 工具链膨胀需要统一管理，零散治理已无法应对复杂度增长
    action: 统一命名和分类规则，明确领域边界，建立体系化的治理框架以降低维护负担
    trigger: persistent
    risk: low
  biases:
  - id: 660e8400-e29b-41d4-a716-446655440014
    belief: 认为工具链可以自然发展，等到出问题时再治理也来得及
    fact: 工具链膨胀带来的认知负荷是渐进累积的——等到出问题时已消耗大量认知资源，主动治理成本更低
situations:
- id: f6a7b8c9-d0e1-2345-fabc-456789012320
  name: infra
  label: 基础设施
  content:
    agenda: 从混乱的多系统并存局面中找到统一的数据和架构标准，构建以标准为核心的平台体系。
    ecology: 数据流向作为核心关注、"不能拆分"因为意图不同、"自我标准化"作为元概念提出、标准被确立为系统的核心价值、看板 vs 瀑布的本质追问。
    frame: 将标准化理解为系统的元能力——自我标准化是系统浮现出的原能力，标准不是工具而是系统的核心价值本身，从设计系统跃迁到设计能够自我设计系统的系统。
    dynamics: 从分拆困惑到不能拆分的决定，再到自我标准化的元认知升维，最后回归到看板 vs 瀑布的建模再应用。
intentions:
- id: f1d72505-b7a4-49f1-9f51-ffaf3755c455
  title: 构建标准化平台架构
  description: 从混乱的多系统并存中找到统一的架构标准，通过"自我标准化"构建以标准为核心的平台体系
  motivation: 数据流向不清和系统分拆困惑引发了对标准化的深层思考
  agent:
    name: founder
    label: 创始人
  level:
    name: middle
    label: 中层
    description: 为顶层"平台可维护可演化"服务
  priority:
    name: medium
    label: 中
    description: 自我标准化的提出是本条最大的认知跃迁
  trigger:
    name: persistent
    label: 持续
    description: 自我标准化作为系统元能力的长期方向
  risk:
    name: medium
    label: 中
    description: 标准化需要收敛和稳定，与涌现方法论的开放式探索存在节奏矛盾
