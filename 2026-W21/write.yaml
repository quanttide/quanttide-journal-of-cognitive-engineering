    label: 中层
    description: 为顶层"认知工具开发"服务
  priority:
    name: low
    label: 低
    description: 5/21首次找到"小说与工作的接口"是关键转折
  trigger:
    name: conditional
    label: 条件触发
    description: 认知接口涌现时深入探索
  risk:
    name: low
    label: 低
    description: 创作时间与工程时间存在竞争但方向已明确
