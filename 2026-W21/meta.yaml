schemas:
- usage: 当标准化与元智能职能持续重叠，独立维护负担超过其价值，需要降低治理复杂度时使用
  entities:
  - name: 标准化
    attributes:
    - 与元智能功能持续重叠
    - 独立维护导致领域膨胀
    - 维护负担随复杂度非线性增长
  - name: 元智能
    attributes:
    - 自然产出标准化能力
    - 具备系统自我维护的潜力
    - 标准化是其成熟的副产品
  - name: 治理复杂度
    attributes:
    - 职能拆分增加沟通成本
    - 领域膨胀导致认知负担
    - 合并是降低复杂度的手段
  causals:
  - condition: 标准化与元智能职能持续重叠，独立维护导致领域膨胀和治理复杂度上升
    outcome: 需要将标准化职能合并回元智能，降低治理复杂度——标准化的终点不是规则文档，而是系统自我维护的元能力
  - condition: 元智能具备自我维护能力，标准化是其自然产出
    outcome: 标准化不再需要独立职能推动，而是融入元智能的日常工作流
  boundaries:
  - 假设元智能具备足够的自我治理能力，不适用于尚未建立元认知的系统
  - 适用于标准化与元智能职能已有明显重叠的阶段，不适用于标准化体系尚未建立的初期
  - 不涵盖外部合规性要求的独立审计场景
  properties:
  - key: 职能关系
    value: 标准化是元智能的自然产出
  - key: 合并原则
    value: 降低治理复杂度，而非简单删减职能
  - key: 终极目标
    value: 系统自我维护的元能力，而非静态规则文档
  dynamics:
  - key: 治理演化
    value: 从独立标准化到合并回元职能
  - key: 成熟度提升
    value: 从人工推动标准化到系统自我维护标准
  mappings:
  - intent: 合并标准化回元职能
    motivation: 标准化与元智能功能重叠导致领域膨胀，独立维护负担增加
    action: 将标准化职能合并回元智能，将标准化产出转化为系统自我维护能力，降低治理复杂度
    trigger: conditional
    risk: low
  biases:
  - id: 660e8400-e29b-41d4-a716-446655440010
    belief: 认为标准化需要独立的职能和专门团队来持续推动才能见效
    fact: 标准化的终点不是规则文档而是系统自我维护的元能力——当元智能足够成熟时，标准化是自然产出，独立维护反而增加治理复杂度
situations:
- id: f6a7b8c9-d0e1-2345-fabc-456789012321
  name: meta
  label: 元
  content:
    agenda: 从实际工程问题出发，通过蒸馏方法自研数据契约和标准化方案，确立"工具包即契约"的代码宪法地位。
    ecology: 数据契约从协议演变为工具包即契约再升华为代码宪法、从实际问题出发蒸馏而非自上而下定义、标准化与知识标准化数据标准化概念化信息化的四层联动。
    frame: 将标准化理解为从实际问题蒸馏出来的代码宪法——契约是代码的宪法层面的约束，工具包即契约确保标准化可执行，自上而下定义不如从实际问题蒸馏可靠。
    dynamics: 从契约作为代码宪法的提出到从实际问题出发蒸馏的方法论确立，再到标准化四层联动的体系成型。
intentions:
- id: bbbbc74d-d756-44a8-a784-9110c7422f25
  title: 从实际问题蒸馏数据标准化体系
  description: 从实际工程问题出发蒸馏数据契约和标准化方案，确立"工具包即契约"的代码宪法地位
  motivation: 对比DCP协议后发现现成框架不适合非结构化数据场景
  agent:
    name: founder
    label: 创始人
  level:
    name: middle
    label: 中层
    description: 为顶层"系统可维护"服务
  priority:
    name: low
    label: 低
    description: 全周潜行但影响力渗透在所有工程活动中
  trigger:
    name: conditional
    label: 条件触发
    description: 实际工程问题出现时自然沉淀
  risk:
    name: low
    label: 低
    description: 蒸馏式策略灵活，跨情境一致性可通过上层抽象协调
