    label: 高
    description: 0.1→0.2版本跃迁，工具链生态初步成型
  trigger:
    name: persistent
    label: 持续
    description: Skill→Command的演化路径已确立
  risk:
    name: medium
    label: 中
    description: Rust迁移带来短期生产力下降
